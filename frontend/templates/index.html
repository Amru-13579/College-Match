<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollegeMatch</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="home-container">
        <div class="form-container">
            <h1>CollegeMatch</h1>
            <p class="subtitle">Find colleges that fit your budget and location.</p>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST" id="search-form">
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location"
                           placeholder="Zip code or city, state"
                           value="{{ form.get('location', '') }}" required>
                </div>

                <div class="form-group">
                    <label for="max_budget">Max annual tuition ($)</label>
                    <input type="number" id="max_budget" name="max_budget"
                           placeholder="25000"
                           value="{{ form.get('max_budget', '') }}" required min="0">
                </div>

                <div class="form-group">
                    <label for="max_distance">Max distance (miles)</label>
                    <input type="number" id="max_distance" name="max_distance"
                           placeholder="500"
                           value="{{ form.get('max_distance', '') }}" required min="0">
                </div>

                <div class="form-group">
                    <label for="climate_preference">Climate preference</label>
                    {% set selected_climate = form.get('climate_preference', 'any') %}
                    <select id="climate_preference" name="climate_preference">
                        <option value="any" {% if selected_climate == 'any' %}selected{% endif %}>No preference</option>
                        <option value="warm" {% if selected_climate == 'warm' %}selected{% endif %}>Warm</option>
                        <option value="mild" {% if selected_climate == 'mild' %}selected{% endif %}>Mild</option>
                        <option value="cool" {% if selected_climate == 'cool' %}selected{% endif %}>Cool</option>
                        <option value="dry" {% if selected_climate == 'dry' %}selected{% endif %}>Dry</option>
                        <option value="rainy" {% if selected_climate == 'rainy' %}selected{% endif %}>Rainy</option>
                    </select>
                </div>

                <div class="button-row">
                    <button type="submit">Search</button>
                    <a href="#" class="clear-link" id="clear-btn">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('clear-btn').addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelectorAll('#search-form input').forEach(i => i.value = '');
            document.getElementById('climate_preference').value = 'any';
        });
    </script>
</body>
</html>
